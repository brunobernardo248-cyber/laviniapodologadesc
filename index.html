<body>

<button id="topBtn" class="top">↑</button>


<script>

const services = [

{
title:"Podologia Clínica",
description:"Tratamento de unhas encravadas e calosidades.",
category:"unha",
symptoms:["unha encravada","dor no dedo"]
},

{
title:"Cuidado Preventivo",
description:"Avaliação completa da saúde dos pés.",
category:"prevenção",
symptoms:["pele ressecada"]
},

{
title:"Pé diabético",
description:"Tratamento especializado para pacientes diabéticos.",
category:"diabetes",
symptoms:["pé diabético"]
}

]

let currentFilter = ""

function renderServices(){

const container = document.getElementById("services")

const search = document.getElementById("search").value.toLowerCase()

container.innerHTML=""

services.forEach(service=>{

const text =
service.title.toLowerCase()+
service.description.toLowerCase()+
service.symptoms.join(" ").toLowerCase()

if(
text.includes(search) &&
(currentFilter=="" || service.category==currentFilter)
){

container.innerHTML+=`

<div class="card">

<h3>${service.title}</h3>

<p>${service.description}</p>

</div>

`

}

})

}

function filterService(cat){

currentFilter = cat
renderServices()

}

document.getElementById("search").addEventListener("input",renderServices)

renderServices()

const topBtn = document.getElementById("topBtn")

window.onscroll = function(){

if(document.documentElement.scrollTop > 400){

topBtn.style.display="block"

}else{

topBtn.style.display="none"

}

}

topBtn.onclick = function(){

window.scrollTo({top:0,behavior:"smooth"})

}

</script>
