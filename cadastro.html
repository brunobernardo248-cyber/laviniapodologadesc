<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro | Lavínia Podóloga</title>
  <meta name="description" content="Cadastro de clientes - Lavínia Podóloga">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; color: #2e2824; background: #faf8f5; }
    h1, h2, h3 { font-family: 'Playfair Display', serif; }

    .hero {
      position: relative; min-height: 60vh; display: flex; align-items: center; justify-content: center;
    }
    .hero img {
      position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover;
    }
    .hero-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to bottom, rgba(46,40,36,.6), rgba(46,40,36,.7));
    }
    .hero-content {
      position: relative; z-index: 10; text-align: center; padding: 1.5rem;
    }
    .hero h1 { font-size: 2.5rem; color: #fff; }

    .services { padding: 5rem 1.5rem; background: #fff; text-align: center; }
    .section-label { color: #c2506a; font-size: .8rem; letter-spacing: .2em; text-transform: uppercase; margin-bottom: .5rem; }
    .services h2 { font-size: 2rem; margin-bottom: 2rem; }

    form {
      max-width: 500px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    input {
      padding: 14px;
      border-radius: 10px;
      border: 1px solid #e8e2db;
      font-size: 14px;
    }

    button {
      padding: 14px;
      background: #c2506a;
      color: white;
      border: none;
      border-radius: 999px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #a9445b;
    }

    .footer { padding: 2rem 1.5rem; background: #2e2824; color: rgba(255,255,255,.6); text-align: center; font-size: .85rem; }
    .footer .brand { color: rgba(255,255,255,.8); font-family: 'Playfair Display', serif; }

    .whatsapp-btn {
      position: fixed; bottom: 1.25rem; left: 50%; transform: translateX(-50%);
      padding: 1rem 2rem; background: #25d366; color: #fff;
      border-radius: 9999px; text-decoration: none; font-weight: 600;
    }
  </style>
</head>

<body>

  <!-- HERO -->
  <section class="hero">
    <img src="https://bemestarestetica.com.br/site/wp-content/uploads/2018/10/podologia-1.jpg">
    <div class="hero-overlay"></div>
    <div class="hero-content">
      <h1>Cadastro de Cliente</h1>
    </div>
  </section>

  <!-- CADASTRO -->
  <section class="services">
    <p class="section-label">Cadastro</p>
    <h2>Preencha seus dados</h2>

    <form action="https://formsubmit.co/seuemail@gmail.com" method="POST">

      <input type="text" name="nome" placeholder="Seu nome" required>

      <input type="tel" name="telefone" placeholder="Telefone" required>

      <input type="email" name="email" placeholder="Email">

      <button type="submit">Cadastrar</button>

    </form>
  </section>

  <!-- FOOTER -->
  <footer class="footer">
    <p class="brand">👣 Lavínia Podóloga</p>
    <p>&copy; 2026 — Todos os direitos reservados</p>
  </footer>

  <!-- WHATSAPP -->
  <a class="whatsapp-btn"
     href="https://wa.me/5532998016614?text=Olá!%20Acabei%20de%20me%20cadastrar%20no%20site%20e%20gostaria%20de%20agendar%20um%20horário."
     target="_blank">
     💬 Falar no WhatsApp
  </a>

</body>
</html>
